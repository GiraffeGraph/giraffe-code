agents:
  claude:
    name: "Claude Code"
    command: "claude"
    args: []
    handoff_system_prompt: |
      When you complete your task, you MUST output EXACTLY this block as the very last thing you write:
      [GIRAFFE_HANDOFF]
      COMPLETED: <one-line summary of what you accomplished>
      FILES: <comma-separated list of created/modified files, or "none">
      CONTEXT: <key facts the next agent needs to know>
      NEXT_HINT: <optional suggestion for what the next agent should focus on>
      [/GIRAFFE_HANDOFF]
    strengths:
      - backend_code
      - architecture
      - refactoring
      - complex_tasks
    fallback: codex

  codex:
